name: GUI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # Install Playwright browser dependencies
      - name: Install Playwright Browsers
        run: pnpm --filter @iamjarvis/extbridge-gui exec playwright install --with-deps

      - name: Build and Package GUI
        run: pnpm --filter @iamjarvis/extbridge-gui run build

      - name: Run GUI E2E Tests
        run: pnpm --filter @iamjarvis/extbridge-gui exec playwright test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: packages/gui/playwright-report/
          retention-days: 7
